models:
  compression: meta-llama/Llama-3.3-70B-Instruct:groq
  routing_oracle: meta-llama/Llama-3.3-70B-Instruct:groq
  evaluation: meta-llama/Llama-3.3-70B-Instruct:groq

thresholds:
  short_description_tokens: 40
  min_reference_tokens: 30
  max_feedback_iterations: 2
  max_restore_steps: 3

oracle:
  num_test_queries: 8
  num_distractors: 4
  include_adversarial: true

